name: Validate

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run structural validation
        run: node tools/validate-research-skill.mjs

      - name: Validate eval JSON
        run: node -e "JSON.parse(require('fs').readFileSync('skills/research-proof/evals/evals.json', 'utf8'))"

      - name: Validate skill-creator export
        run: node tools/export-skill-creator-evals.mjs --check

      - name: Smoke external eval pack
        run: node tools/create-research-eval-pack.mjs --ids 14,15 --prompt-variant typo --out research-proof-workspace/eval-pack-smoke.json

      - name: Run deterministic backtest harness
        run: node tools/run-research-backtest.mjs --clean --json

      - name: Rate capability gates
        run: node tools/rate-research-skill.mjs --out research-proof-workspace/capability-gates.md
